<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="default">
        <div>This element is under div tag</div>
        <span>This element is under span tag</span>
    </div>
    <div class="force-inline">
        <div>This element is under div tag forced to be inline</div>
        <span>This element is under span tag</span>
    </div>
    <div class="force-block">
        <span>This element is under normal span tag</span>
        <button>Submit</button>
    </div>
    <div class="block-inline">
        <div id="blue">Box1</div>
        <div id="green">Box2</div>
        <div id="red">Box3</div>
        <div id="yellow">Box4</div>
    </div>
    <div class="block-inline">
        <div id="blue">Box1</div>
        <div id="violet">Box5</div>
        <div id="green">Box2</div>
        <div id="red">Box3</div>
    </div>
    <div id="box1"> Box1
        <div id="box2">Box 2</div>
    </div>
    <br>
    <div id="box3"> Box3
        <div id="box4">Box 4</div>
    </div>
</body>
</html>
